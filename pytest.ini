[pytest]
# Package-local test runner.
#
# Usage:
#   cd jupyter_tikz
#   pytest
#   JUPYTER_TIKZ_RUN_RENDER_TESTS=1 pytest

testpaths =
    tests

addopts =
    -ra
    --import-mode=importlib

markers =
    needs_latex: tests that require a LaTeX toolchain to be installed (opt-in via env var)
    needs_pdftocairo: tests that require pdftocairo to be installed
    needs_lualatex: tests that require a working lualatex engine
    render: tests that require external rendering toolchains (LaTeX + SVG converter)
